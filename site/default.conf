# Apex -> www canonical redirect. Traefik terminates TLS and proxies both
# awakenlumora.com and www.awakenlumora.com to this container on :80.
server {
    listen 80;
    server_name awakenlumora.com;
    return 301 https://www.awakenlumora.com$request_uri;
}

# Canonical host (and catch-all for direct / preview access).
server {
    listen 80 default_server;
    server_name www.awakenlumora.com _;

    root /usr/share/nginx/html;
    index index.html;

    # HTML always revalidates, so new ?v= asset versions are picked up immediately
    # (defends against any HTML edge-caching). Assets are busted via ?v= query string.
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "no-cache";
    }

    # Static assets — cache-busted via ?v= in the HTML references.
    location ~* \.(css|js|woff2?|jpg|jpeg|png|svg|ico)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }
}
